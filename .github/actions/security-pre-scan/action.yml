name: Security Pre Scan
description: Secrets + filesystem vuln scan
inputs:
  service_path: {required: true, description: "Path to service"}
  severity: {required: true, description: "Severity of vulnerabilities to scan for. E.g. HIGH,CRITICAL"}
runs:
  using: composite
  steps:
    - name: Secrets scan
      shell: bash
      run: |
        docker pull ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
        docker run --rm -w /path -v ${{ github.workspace }}:/path ghcr.io/gitleaks/gitleaks:v8.30.1@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f git --exit-code 1
    
    - name: FS vulnerabilities scan
      uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
      with:
        scan-type: fs
        scan-ref: ${{ inputs.service_path }}
        severity: ${{ inputs.severity }}
        ignore-unfixed: false
        exit-code: 1
        format: 'json'
        output: 'fs-trivy-report.json'
        vuln-type: library
    
    - name: Upload reports
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      if: always()
      with:
        name: fs-security-artifacts
        if-no-files-found: error
        path: |
          fs-trivy-report.json
