name: ci-ts-service

on:
  pull_request:
    paths: ["consumers/node-service/**", ".github/workflows/ci-ts-service.yml", ".github/workflows/reusable-service-ts.yml", ".github/actions/**"]
  push:
    branches: ["main", "master"]
    paths: [ "consumers/node-service/**", ".github/workflows/ci-ts-service.yml", ".github/workflows/reusable-service-ts.yml", ".github/actions/**"]

jobs:
  call:
    permissions: {contents: read, packages: write}
    uses: "./.github/workflows/reusable-service-ts.yml"
    with:
      service_path: consumers/node-service
      image_name: node-service
      publish: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
